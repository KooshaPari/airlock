name: Publish image + MCP Registry

# Builds the OCI image and pushes it to GHCR, then (on a version tag, or when
# explicitly requested) publishes server.json to the official MCP Registry via
# GitHub OIDC — no PAT required. The image carries the
# io.modelcontextprotocol.server.name label the registry checks for ownership.
#
# Note: the GHCR package must be PUBLIC for the registry to read its manifest.
# GHCR packages are private on first push — flip it to public once under
# https://github.com/users/adamorad/packages/container/airlock/settings

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_registry:
        description: "Also publish to the MCP Registry (image must already be public)"
        type: boolean
        default: false

env:
  IMAGE: ghcr.io/adamorad/airlock

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive version tag
        id: meta
        run: |
          if [ "${GITHUB_REF}" != "${GITHUB_REF#refs/tags/v}" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(grep -oE 'Number = "[^"]+"' internal/version/version.go | cut -d'"' -f2)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:latest

  registry:
    needs: image
    if: ${{ github.event_name == 'push' || inputs.publish_registry }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
